version: "3.8"

services:
  vnc-dashboard:
    image: ghcr.io/omnitx/docker-vnc-stations:latest
    container_name: vnc-monitor-dashboard
    ports:
      - "8105:80"
      - "6100-6199:6100-6199"
    volumes:
      - vnc_data:/app/data
    environment:
      - VNC_ENCRYPTION_KEY=${VNC_ENCRYPTION_KEY:-vnc-monitor-default-key-change-me}
      - HEALTH_CHECK_INTERVAL=${HEALTH_CHECK_INTERVAL:-30}
    restart: unless-stopped

volumes:
  vnc_data:
